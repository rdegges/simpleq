name: Bug report
description: Report a runtime, DX, or documentation bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include code, commands, and environment details.
    validations:
      required: true
  - type: textarea
    id: versions
    attributes:
      label: Versions
      description: Python, SimpleQ, boto3/botocore, and LocalStack versions.
    validations:
      required: true
